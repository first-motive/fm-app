# Joint limits for the Axol arms, consumed by MoveIt Servo
# (robot_description_planning). Position bounds come from the URDF; these velocity +
# acceleration caps are teleop-safe values (well below the URDF's 30 rad/s spec limit)
# that Servo uses for joint_limit_margin slowdown near the bounds.
default_velocity_scaling_factor: 0.5
default_acceleration_scaling_factor: 0.5

joint_limits:
  right_s1_0:
    has_velocity_limits: true
    max_velocity: 3.14
    has_acceleration_limits: true
    max_acceleration: 1.0
  right_s2_0:
    has_velocity_limits: true
    max_velocity: 3.14
    has_acceleration_limits: true
    max_acceleration: 1.0
