# MoveIt Servo PoseTracking deltas over servo.yaml, for the vision pose-mirroring path
# (pose_tracking_node). pose_tracking.launch.py deep-merges this moveit_servo block onto
# servo.yaml's, so this holds ONLY what differs from twist jogging: the command interpretation
# and the PoseTracking PID gains. These gains are the hardware-tuning surface — start
# conservative (P-only) and raise the proportional gains for snappier tracking.
moveit_servo:
  # CRITICAL for pose tracking: the command frame must be the END EFFECTOR, not the base.
  # PoseTracking reads the current EE pose from Servo::getCommandFrameTransform(), which returns
  # planning_frame -> robot_link_command_frame. servo.yaml sets that to the base link (==
  # planning_frame) for twist jogging, which would make the transform IDENTITY here — PoseTracking
  # would then think the EE is at the origin and drive every joint to zero (the straight
  # singularity). The pose-tracking demo sets robot_link_command_frame = ee_frame for exactly this
  # reason, so override it to the EE link.
  robot_link_command_frame: openarm_right_link7

  # PoseTracking's internal PID emits an actual Cartesian velocity (m/s, rad/s), so Servo must
  # read it as speed_units. (With "unitless" Servo would re-scale it by scale.linear, changing
  # the effective loop gain.) Singularity + joint-limit slowdown still apply in speed_units mode,
  # so the straight-arm singularity protection carries over.
  command_in_type: speed_units

  # --- PoseTracking PID gains (read from the moveit_servo namespace) ---
  windup_limit: 0.05
  # P-only Cartesian position loop (command_in_type speed_units, so twist = gain * error in m/s).
  # The sim arm is gravity-compensated (see scripts/import-externals.sh), so the arm holds at any
  # gain; this value sets the mirror tracking responsiveness. Tune on hardware. 3.0 is a smooth
  # middle ground (moveit's demo default is 1.5; higher = snappier/faster EE follow).
  x_proportional_gain: 3.0
  y_proportional_gain: 3.0
  z_proportional_gain: 3.0
  x_integral_gain: 0.0
  y_integral_gain: 0.0
  z_integral_gain: 0.0
  x_derivative_gain: 0.0
  y_derivative_gain: 0.0
  z_derivative_gain: 0.0

  # Orientation tracking DISABLED (angular gain 0) — translation-only mirroring is the robust
  # v1 (mono-camera hand orientation is unreliable anyway). With a non-zero angular gain the
  # PID chases the fixed target quaternion: any tiny motion grows the orientation error, the
  # AngleAxis angular command (up to pi) drags the EE position, and the arm runs away into the
  # straight singularity. Zero gain => zero angular twist => pure Cartesian-position servoing.
  # The node also sets a wide angular tolerance so orientation never gates completion.
  angular_proportional_gain: 0.0
  angular_integral_gain: 0.0
  angular_derivative_gain: 0.0
